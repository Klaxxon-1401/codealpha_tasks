<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — CoStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo" id="header-logo">CoStore</a>
            
            <nav class="nav">
                <a href="/" class="nav-link">Shop</a>
                <a href="/orders/" class="nav-link" id="nav-orders" style="display: none;">My Orders</a>
                <a href="/cart/" class="cart-btn" id="nav-cart">
                    <span>Cart</span>
                    <span class="cart-badge" id="cart-count">0</span>
                </a>
            </nav>

            <div class="auth-section" id="auth-header-section">
                <a href="/auth/" class="btn btn-outline btn-sm">Sign In</a>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="product-details-container" id="product-details">
            <!-- Dynamically populated by JS based on ID query parameter -->
            <div class="loading-spinner">Loading product details...</div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 CoStore. All rights reserved. Built for CodeAlpha.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
